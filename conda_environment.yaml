name: muxgel
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  - torchaudio
  - numpy>=1.24 
  - scipy
  - pandas
  - matplotlib
  - opencv    
  - scikit-image
  
  - jupyter
  - ipykernel
  - wandb    
  - tensorboard
  - psutil
  - click
  - pyyaml
  - trimesh
  
  - pip:
    - segmentation-models-pytorch==0.3.3 
    - torchmetrics[image]>=1.0.0       
    - lpips                        
    - timm       
    - mujoco>=2.3.0
    - open3d>=0.18.0
  